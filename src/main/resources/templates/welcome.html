<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to BACH</title>
    <style>
        :root {
            --primary-color: #00f2ff;
            --secondary-color: #00a8ff;
            --bg-color: #0a0a0a;
            --text-color: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2s ease-in-out infinite alternate;
        }

        p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            text-decoration: none;
            color: var(--bg-color);
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 50px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.6);
        }

        /* Background Grid Animation */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            perspective: 500px;
            transform-style: preserve-3d;
            z-index: 0;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0) rotateX(20deg); }
            100% { transform: translateY(50px) rotateX(20deg); }
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
            to { text-shadow: 0 0 20px rgba(0, 242, 255, 0.6), 0 0 10px rgba(0, 168, 255, 0.4); }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="container">
        <h1>System Online</h1>
        <p>Welcome to the BACH Interface</p>
        <a href="/transforming" class="btn">Go to Transforming</a>
    </div>
</body>
</html>
