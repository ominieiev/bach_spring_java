<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Transformation</title>
    <style>
        :root {
            --primary-color: #00f2ff;
            --secondary-color: #00a8ff;
            --bg-color: #0a0a0a;
            --surface-color: #1a1a1a;
            --text-color: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background-color: var(--surface-color);
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            z-index: 1;
            width: 400px;
            border: 1px solid rgba(0, 242, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        .upload-area {
            border: 2px dashed rgba(0, 242, 255, 0.3);
            border-radius: 10px;
            padding: 2rem;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: var(--primary-color);
            background-color: rgba(0, 242, 255, 0.05);
        }

        input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .icon {
            font-size: 3rem;
            color: var(--secondary-color);
            margin-bottom: 1rem;
            display: block;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            color: var(--bg-color);
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 50px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.6);
        }

        /* Background Grid Animation */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .file-name {
            display: block;
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="container">
        <h2>Upload Data</h2>
        <form action="/transforming/transform" method="POST" enctype="multipart/form-data">
            <div class="upload-area">
                <input type="file" name="file" accept=".xlsx" onchange="showFileName(this)" required>
                <span class="icon">📂</span>
                <span>Drop XLSX file here or click to upload</span>
                <span id="file-name-display" class="file-name"></span>
            </div>
            <button type="submit" class="btn">Upgrade users with taxes</button>
        </form>
    </div>

    <script>
        function showFileName(input) {
            const fileNameDisplay = document.getElementById('file-name-display');
            if (input.files && input.files.length > 0) {
                fileNameDisplay.textContent = input.files[0].name;
            } else {
                fileNameDisplay.textContent = '';
            }
        }
    </script>
</body>
</html>
